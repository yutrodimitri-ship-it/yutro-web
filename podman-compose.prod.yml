version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    container_name: yutro-app
    env_file: .env.production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  db:
    image: docker.io/library/postgres:17-alpine
    container_name: yutro-db
    environment:
      POSTGRES_DB: yutro_prod
      POSTGRES_USER: yutro
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - yutro_pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yutro -d yutro_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    secrets:
      - db_password
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - FOWNER
      - DAC_READ_SEARCH

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: yutro-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

secrets:
  db_password:
    file: ./secrets/db_password.txt

volumes:
  yutro_pgdata:
