version: "3.9"

services:
  db:
    image: docker.io/library/postgres:17-alpine
    container_name: yutro-db-dev
    environment:
      POSTGRES_DB: yutro_dev
      POSTGRES_USER: yutro
      POSTGRES_PASSWORD: yutro_dev_2024
    ports:
      - "5432:5432"
    volumes:
      - yutro_pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yutro -d yutro_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  yutro_pgdata_dev:
